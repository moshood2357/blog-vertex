<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Default Title (Fallback) -->
    <title>{% block title %}Vertex Prime Digital Blog{% endblock %}</title>

    {% block meta %}{% endblock meta %}

    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css')}}" rel="stylesheet">

    <link href="{{ url_for('static', filename='css/style.css')}}" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/fontawesome/css/all.min.css')}}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">



    {% block style %}
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        }

        header {
            background: #0B1F3B;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            flex: 1;
        }

        footer {
            background: #0B1F3B;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
    </style>
    {% endblock %}
</head>


<body>
    <header>
        <h1>Vertex Prime Digital Blog</h1>
        <p>Latest posts from our team</p>
        <div class="" style="display:inline; top: 20px; right:40px; z-index:1000; position:absolute;" >
                <!-- Go Home button -->
            <a href="{{ url_for('main.blog') }}" class="btn btn-outline-primary btn-sm me-2">Go Home</a>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>




    <footer class="bg-dark text-white py-4">
        <div class="container text-center">

            <p>© {{ now.year }} Vertex Prime Digital. All rights reserved.</p>
        </div>
    </footer>



    <!--  JS -->
    <script src="{{url_for('static', filename='bootstrap/js/bootstrap.js')}}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>

{% block js %}{% endblock js %}
